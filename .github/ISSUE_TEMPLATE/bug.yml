name: Bug Report
description: Report a bug in the Gemara MCP Server.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Server version or commit SHA where the bug occurs.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Server mode in use when the bug occurred.
      options:
        - artifact
        - advisory
      default: 0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `gemara-mcp serve --mode artifact`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Relevant log output or error messages.
      render: shell
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: OS, MCP client, Docker vs binary, or any other relevant details.
    validations:
      required: false
