metadata:
  id: GEMARAPROJ.GEMARA.MCP-RISK
  type: RiskCatalog
  gemara-version: "1.0.0-rc.0"
  version: 1.0.0
  description: Risk catalog for Gemara MCP Server operations, integrity, and upstream fetch trust.
  author:
    id: gemara
    name: Gemara Authors
    type: Software Assisted
  mapping-references:
    - id: GEMARAPROJ.GEMARA.MCP
      title: Gemara MCP Server Security Threat Catalog
      version: 1.0.0
      url: https://github.com/gemaraproj/gemara-mcp
      description: Layer 2 threat catalog for the Gemara MCP Server (threats.yaml)

title: Gemara MCP Server Security Risk Catalog
groups:
  - id: availability-resilience
    title: Availability & resilience
    description: Risks that reduce availability, responsiveness, or reliability of validation and authoring flows.
    appetite: Low
    max-severity: High
  - id: integrity-trust
    title: Integrity & trust in data and decisions
    description: Risks that make schema, lexicon, cache, or validation outcomes stale, wrong, or manipulated.
    appetite: Minimal
    max-severity: High
  - id: supply-chain-transport
    title: Supply chain & transport
    description: Risks from compromised upstream sources or tampering on external fetch paths.
    appetite: Minimal
    max-severity: High

risks:
  - id: GEMARAPROJ.GEMARA.MCP-RISK.R01
    title: Disruption of authoring and validation workflows
    description: Lexicon, schema, or wizard prompts are unavailable or degraded, slowing or blocking artifact work.
    group: availability-resilience
    severity: High
    impact: Validation and authoring timelines slip; reviews and releases may be delayed or bypassed.
    threats:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR01
            remarks: Lexicon retrieval failure or outage.
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR04
            remarks: Schema source unreachable.
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR09
            remarks: Guided prompts degraded or unavailable.

  - id: GEMARAPROJ.GEMARA.MCP-RISK.R02
    title: Misleading reference data (lexicon or schema docs)
    description: Consumers use stale or incorrect lexicon or schema docs and produce semantically incorrect artifacts.
    group: integrity-trust
    severity: High
    impact: Artifacts appear compliant but miss expectations, causing rework and audit findings.
    threats:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR02
            remarks: Stale or wrong lexicon version.
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR07
            remarks: Stale or wrong schema version for validation or docs.

  - id: GEMARAPROJ.GEMARA.MCP-RISK.R03
    title: Denial of service against validation
    description: Oversized or pathological YAML consumes excessive resources and degrades validation for other callers.
    group: availability-resilience
    severity: Medium
    impact: Shared instances become unstable and require throttling or restart.
    threats:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR03
            remarks: Resource exhaustion via large or complex YAML.

  - id: GEMARAPROJ.GEMARA.MCP-RISK.R04
    title: Loss of trust in validation results
    description: Cache poisoning, validation bypass, or wrong schema selection causes false positives or false negatives.
    group: integrity-trust
    severity: High
    impact: Invalid artifacts may pass or valid artifacts may fail, undermining the server as a security gate.
    threats:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR05
            remarks: Schema cache poisoning.
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR06
            remarks: Validation bypass or false acceptance.

  - id: GEMARAPROJ.GEMARA.MCP-RISK.R05
    title: Unsafe or non-compliant wizard output
    description: Prompt injection or weak prompt structure yields unsafe, non-compliant, or data-leaking outputs.
    group: integrity-trust
    severity: High
    impact: Published artifacts or policies can be incorrect or malicious, causing compliance and reputational harm.
    threats:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR08
            remarks: Prompt injection affecting guided flows.

  - id: GEMARAPROJ.GEMARA.MCP-RISK.R06
    title: Compromise of upstream or in-transit fetched content
    description: Attackers tamper with lexicon or schema at source or in transit, and poisoned content spreads via cache.
    group: supply-chain-transport
    severity: High
    impact: Tampered definitions can be widely accepted until sources and caches are corrected.
    threats:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR10
            remarks: Upstream supply chain compromise.
          - reference-id: GEMARAPROJ.GEMARA.MCP.THR11
            remarks: Network interception of external fetches.
